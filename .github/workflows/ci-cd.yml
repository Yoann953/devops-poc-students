name: CI/CD Pipeline - Students App

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dependances
        run: npm install && npm install aws aws-sdk

      - name: Verifier la syntaxe
        run: node -e "console.log('Syntax check OK')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t students-app .

      - name: Verifier image
        run: docker images students-app

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/resources/codebase_partner
            git pull origin main || true
            docker build -t students-app .
            docker stop students-app 2>/dev/null || true
            docker rm students-app 2>/dev/null || true
            docker run -d \
              --name students-app \
              --restart unless-stopped \
              -p 80:80 \
              -e APP_DB_HOST=students-db.cw5ihhd7nmgp.us-east-1.rds.amazonaws.com \
              -e APP_DB_USER=nodeapp \
              -e APP_DB_PASSWORD=student12 \
              -e APP_DB_NAME=STUDENTS \
              -e APP_PORT=80 \
              students-app
            sleep 5
            curl -f http://localhost:80/ && echo "DEPLOY OK" || echo "DEPLOY FAILED"
